name: "Epstein Files Transparency Act"
slug: "epstein"
description: "1.38M documents (2.77M pages) released under the Epstein Files Transparency Act"
documents_dir: "./data/efta"

ocr:
  backend: "both"
  workers: 8

entities:
  types: ["PERSON", "ORG", "GPE", "DATE", "MONEY"]
  registry: "./data/persons-registry.json"

dedup:
  threshold: 0.90
  bates_prefixes: ["EFTA"]

captioning:
  model: "microsoft/Florence-2-base"
  char_threshold: 100

images:
  min_size: 50
  min_bytes: 5120
  page_scan_ratio: 0.8
  analysis_model: "Qwen/Qwen2-VL-2B-Instruct"

pipeline:
  embeddings: false
  knowledge_graph: false
  redaction_analysis: false

serve:
  port: 8001
  title: "Epstein Files — Document Search"

ask_proxy_enabled: true
openrouter_api_key_env: "OPENROUTER_API_KEY"
